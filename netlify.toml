[[headers]]
  # The service worker must NOT be cached by the browser, 
  # otherwise updates will never be detected.
  for = "/sw.js"
  [headers.values]
    Cache-Control = "max-age=0, must-revalidate"

[[headers]]
  # Good practice for the main HTML to ensure freshness if SW fails
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Static assets (images, manifests) can be cached longer if you want,
  # but since we don't have hashed filenames, we keep it safe.
  for = "/*.json"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  # Content Security Policy
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://cdn.jsdelivr.net 'unsafe-inline'; style-src 'self' https://cdn.jsdelivr.net https://fonts.googleapis.com 'unsafe-inline'; font-src https://fonts.gstatic.com; connect-src 'self' https:; img-src 'self' data: blob:; frame-src 'none'; base-uri 'self'; form-action 'self';"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
